spec_version: "0.1.0"
name: infra-agent
version: 1.0.0
description: Infrastructure management agent for AWS multi-account org
author: iscmga
license: MIT

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-6
  constraints:
    temperature: 0.2
    max_tokens: 8192

targets:
  - claude-code
  - cursor

skills:
  - terraform
  - aws-ops
  - ci-cd

tools:
  - aws-api
  - terraform-cli

runtime:
  max_turns: 50
  timeout: 300

tags:
  - infrastructure
  - devops
  - aws
  - terraform
