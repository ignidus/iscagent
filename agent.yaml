spec_version: "0.1.0"
name: iscagent
version: 0.1.0
description: Portable AI agent definitions for Cursor and Claude Code
author: iscmga
license: MIT

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-6
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.3
    max_tokens: 8192

targets:
  - claude-code
  - cursor

skills:
  # Core workflow
  - coding-standards
  - tdd-workflow
  - verification-loop
  - search-first
  - strategic-compact
  - eval-harness
  - project-guidelines-example
  # Security
  - security-review
  - security-scan
  # Development patterns
  - api-design
  - backend-patterns
  - frontend-patterns
  - database-migrations
  - docker-patterns
  - deployment-patterns
  - postgres-patterns
  # AI & agent tooling
  - deep-research
  - mcp-server-patterns
  # Repo augmentation (understand + document + visualize + CLI + skill discovery)
  - codebase-understanding
  - docs-generation
  - knowledge-graph-visualizer
  - cli-generation
  - repo-augmentation
  - skill-recommender
  # Multi-agent coordination
  - agent-coordination
  - agent-teams
  - model-routing

runtime:
  max_turns: 50
  timeout: 300

tags:
  - infrastructure
  - devops
  - cloud-engineering
