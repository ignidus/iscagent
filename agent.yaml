spec_version: "0.1.0"
name: iscagent
version: 0.1.0
description: Portable AI agent definitions for Cursor and Claude Code
author: iscmga
license: MIT

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-6
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.3
    max_tokens: 8192

targets:
  - claude-code
  - cursor

skills:
  - skill-creator

runtime:
  max_turns: 50
  timeout: 300

tags:
  - infrastructure
  - devops
  - cloud-engineering
